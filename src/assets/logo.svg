<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B4D8" />
      <stop offset="100%" stop-color="#0A97B0" />
    </linearGradient>
  </defs>
  
  <!-- Globe Icon -->
  <g transform="translate(10, 15)">
    <!-- Globe outline -->
    <circle cx="45" cy="45" r="40" fill="none" stroke="#0F1C3F" stroke-width="5" />
    <!-- Lat/Long Lines -->
    <path d="M45 5 C25 5, 25 85, 45 85 C65 85, 65 5, 45 5" fill="none" stroke="#0F1C3F" stroke-width="3" />
    <path d="M5 45 L85 45" fill="none" stroke="#0F1C3F" stroke-width="3" />
    <path d="M15 25 L75 25" fill="none" stroke="#0F1C3F" stroke-width="3" />
    <path d="M15 65 L75 65" fill="none" stroke="#0F1C3F" stroke-width="3" />
    
    <!-- Swooping Arrow -->
    <path d="M 5 65 Q 45 100, 80 15" fill="none" stroke="url(#cyanGrad)" stroke-width="9" stroke-linecap="round" />
    <!-- Arrowhead -->
    <polygon points="70,10 90,5 85,25" fill="#00B4D8" />
    
    <!-- Graduation Cap -->
    <polygon points="65,-5 80,-12 95,-5 80,2" fill="#0F1C3F" />
    <rect x="73" y="-3" width="14" height="6" fill="#0F1C3F" />
    <line x1="95" y1="-5" x2="95" y2="8" stroke="#D4AF37" stroke-width="2" />
    <circle cx="95" cy="8" r="1.5" fill="#D4AF37" />
  </g>

  <!-- Text -->
  <text x="130" y="65" font-family="'Montserrat', sans-serif" font-weight="800" font-size="52" fill="#0F1C3F">Grad<tspan fill="#00B4D8">Route</tspan></text>
  <text x="135" y="95" font-family="'Inter', sans-serif" font-weight="500" font-size="18" fill="#64748b" letter-spacing="0.5">Navigate Your Future.</text>
</svg>
